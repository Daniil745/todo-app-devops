version: '3.8'

services:
  postgres-task:
    image: postgres:15-alpine
    container_name: postgres-tasks
    environment:
      POSTGRES_DB: task
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_task_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - todo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-logs:
    image: postgres:15-alpine
    container_name: postgres-logs
    restart: unless-stopped
    environment:
      POSTGRES_DB: logs
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_logs_data:/var/lib/postgresql/data
    ports:
      - "5433:5433"
    command: -p 5433
    networks:
      - todo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5433"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: todo-app
    build: ./app
    ports:
      - "5001:5000"
    networks:
      - todo-network
    depends_on:
      postgres-task:
        condition: service_healthy
      postgres-logs:
        condition: service_healthy
    environment:
      TASKS_DB_HOST: postgres-task
      TASKS_DB_PORT: 5432
      TASKS_DB_USER: user
      TASKS_DB_PASSWORD: password
      TASKS_DB_NAME: task
      LOGS_DB_HOST: postgres-logs
      LOGS_DB_PORT: 5433
      LOGS_DB_USER: user
      LOGS_DB_PASSWORD: password
      LOGS_DB_NAME: logs

  web:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - todo-network
    depends_on:
      - app

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.55.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - todo-network

  grafana:
    container_name: grafana
    image: grafana/grafana:11.3.0
    volumes:
      - ./grafana/grafana.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - todo-network
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - todo-network

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8081:8080"
    volumes:
      - "/:/rootfs"
      - "/var/run:/var/run"
      - "/sys:/sys"
      - "/var/lib/docker/:/var/lib/docker"
      - "/dev/disk/:/dev/disk"
    privileged: true
    networks:
      - todo-network

  postgres-exporter-tasks:
    container_name: postgres-exporter-tasks
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:admin@postgres-task:5432/task?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - todo-network
    depends_on:
      postgres-task:
        condition: service_healthy

  postgres-exporter-logs:
    container_name: postgres-exporter-logs
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:admin@postgres-logs:5433/logs?sslmode=disable"
    ports:
      - "9188:9187"
    networks:
      - todo-network
    depends_on:
      postgres-logs:
        condition: service_healthy

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:linux-amd64-2.19.0
    ports:
      - "9000:9000"
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - ./portainer_data:/data
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  postgres_task_data:
  postgres_logs_data:
  grafana_data:

