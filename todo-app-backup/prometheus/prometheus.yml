global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'app'
    static_configs:
      - targets: ['app:5000']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'postgres-task'
    static_configs:
      - targets: ['postgres-exporter-tasks:9187']

  - job_name: 'postgres-logs'
    static_configs:
      - targets: ['postgres-exporter-logs:9187']
